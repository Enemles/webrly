name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Installation de Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.11.1'
          cache: 'pnpm'

      - name: Installation des dépendances
        run: pnpm install --frozen-lockfile

      - name: Setup environment variables for build
        run: |
          cp .env.example .env
          # Variables minimales pour que le build passe
          echo "STRIPE_SECRET_KEY=sk_test_dummy_key_for_build" >> .env
          echo "NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=pk_test_dummy_key_for_build" >> .env
          echo "CLERK_SECRET_KEY=sk_test_dummy_key_for_build" >> .env
          echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=pk_test_dummy_key_for_build" >> .env
          echo "DATABASE_URL=postgresql://dummy:dummy@localhost:5432/dummy" >> .env
          echo "NEXTAUTH_SECRET=dummy-secret-for-build" >> .env

      - name: Génération du client Prisma
        run: npx prisma generate

      - name: Build du projet
        run: pnpm build
        env:
          CI: true
          NODE_ENV: production

  e2e-tests:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/develop' || github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'develop'
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Installation de Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.11.1'
          cache: 'pnpm'

      - name: Installation des dépendances
        run: pnpm install --frozen-lockfile

      - name: Installation de Playwright
        run: npx playwright install --with-deps

      - name: Setup environment variables for tests
        run: |
          cp .env.example .env
          echo "STRIPE_SECRET_KEY=sk_test_dummy_key_for_tests" >> .env
          echo "NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=pk_test_dummy_key_for_tests" >> .env
          echo "CLERK_SECRET_KEY=sk_test_dummy_key_for_tests" >> .env
          echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=pk_test_dummy_key_for_tests" >> .env
          echo "DATABASE_URL=postgresql://dummy:dummy@localhost:5432/dummy" >> .env
          echo "NEXTAUTH_SECRET=dummy-secret-for-tests" >> .env

      - name: Génération du client Prisma
        run: npx prisma generate

      - name: Exécution des tests end-to-end
        run: npx playwright test
        env:
          CI: true

      - name: Upload des rapports de test
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
