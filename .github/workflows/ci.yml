name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      # Variables nécessaires pour le build - valeurs factices mais valides
      DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
      STRIPE_SECRET_KEY: sk_test_51234567890123456789012345678901234567890123456789012345678901234
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_51234567890123456789012345678901234567890123456789012345678901234
      CLERK_SECRET_KEY: sk_test_1234567890123456789012345678901234567890123456789012345678901234
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_1234567890123456789012345678901234567890123456789012345678901234
      UPLOADTHING_SECRET: sk_live_test123456789012345678901234567890123456789012345678901234567890
      UPLOADTHING_APP_ID: testapp123
      NEXTAUTH_SECRET: test-secret-for-ci-cd-only-not-production-safe
      NEXTAUTH_URL: http://localhost:3000
      NODE_ENV: production
      CI: true
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Configuration de l'environnement
        uses: ./.github/actions/setup-environment
        with:
          environment-type: 'build'

      - name: Build du projet
        run: pnpm build
        env:
          CI: true
          NODE_ENV: production

  e2e-tests:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/develop' || github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'develop'
    env:
      # Variables nécessaires pour les tests E2E - valeurs factices mais valides
      DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
      STRIPE_SECRET_KEY: sk_test_51234567890123456789012345678901234567890123456789012345678901234
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_51234567890123456789012345678901234567890123456789012345678901234
      CLERK_SECRET_KEY: sk_test_1234567890123456789012345678901234567890123456789012345678901234
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_1234567890123456789012345678901234567890123456789012345678901234
      UPLOADTHING_SECRET: sk_live_test123456789012345678901234567890123456789012345678901234567890
      UPLOADTHING_APP_ID: testapp123
      NEXTAUTH_SECRET: test-secret-for-ci-cd-only-not-production-safe
      NEXTAUTH_URL: http://localhost:3000
      NODE_ENV: test
      CI: true
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Configuration de l'environnement
        uses: ./.github/actions/setup-environment
        with:
          environment-type: 'test'
          install-playwright: 'true'

      - name: Exécution des tests end-to-end
        run: npx playwright test
        env:
          CI: true

      - name: Upload des rapports de test
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
