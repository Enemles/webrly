name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v3

      - name: Installation de Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Installation de PNPM
        run: npm install -g pnpm

      - name: Installation des dépendances
        run: pnpm install

      - name: Génération du client Prisma
        run: npx prisma generate

      - name: Build du projet
        run: pnpm build

  e2e-tests:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/develop' || github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'develop'
    steps:
      - name: Récupération du code
        uses: actions/checkout@v3

      - name: Installation de Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Installation de PNPM
        run: npm install -g pnpm

      - name: Installation des dépendances
        run: pnpm install

      - name: Installation de Playwright
        run: npx playwright install --with-deps

      - name: Génération du client Prisma
        run: npx prisma generate

      - name: Exécution des tests end-to-end
        run: npx playwright test
        env:
          CI: true

      - name: Upload des rapports de test
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
