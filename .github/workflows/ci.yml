name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Configuration de l'environnement
        uses: ./.github/actions/setup-environment
        with:
          environment-type: 'build'

      - name: Build du projet
        run: pnpm build
        env:
          CI: true
          NODE_ENV: production

  e2e-tests:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/develop' || github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'develop'
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Configuration de l'environnement
        uses: ./.github/actions/setup-environment
        with:
          environment-type: 'test'
          install-playwright: 'true'

      - name: Exécution des tests end-to-end
        run: npx playwright test
        env:
          CI: true

      - name: Upload des rapports de test
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
