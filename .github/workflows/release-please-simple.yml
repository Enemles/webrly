name: Release Please Simple

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Auto-approve and merge release PR
        if: steps.release.outputs.pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = ${{ steps.release.outputs.pr }};
            const { owner, repo } = context.repo;
            
            // Approuver la PR
            await github.rest.pulls.createReview({
              owner,
              repo,
              pull_number: prNumber,
              event: 'APPROVE'
            });
            
            // Merger la PR
            await github.rest.pulls.merge({
              owner,
              repo,
              pull_number: prNumber,
              merge_method: 'squash'
            });
            
            console.log(`✅ Release PR #${prNumber} merged automatically!`);
            
      - name: Deploy after release
        if: steps.release.outputs.release_created
        run: |
          echo "🚀 Nouvelle version deployée : ${{ steps.release.outputs.tag_name }}"
          # Ajouter ici tes commandes de déploiement Coolify 