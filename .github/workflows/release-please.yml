name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  repository-projects: write
  actions: write
  checks: write
  deployments: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release-created: ${{ steps.release.outputs.release_created }}
      tag-name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
            
  # Auto-merge des PRs de release
  auto-merge:
    runs-on: ubuntu-latest
    if: ${{ !needs.release-please.outputs.release-created }}
    needs: release-please
    steps:
      - name: Auto-merge release PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            
            // Chercher les PRs Release Please ouvertes
            const prs = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head: 'release-please--branches--main'
            });
            
            for (const pr of prs.data) {
              if (pr.title.includes('chore(main): release')) {
                console.log(`Auto-merging PR #${pr.number}: ${pr.title}`);
                
                // Activer auto-merge
                await github.rest.pulls.createReview({
                  owner,
                  repo,
                  pull_number: pr.number,
                  event: 'APPROVE'
                });
                
                // Merger automatiquement
                await github.rest.pulls.merge({
                  owner,
                  repo,
                  pull_number: pr.number,
                  merge_method: 'squash'
                });
              }
            }
            
  # Déploiement automatique après release
  deploy:
    needs: release-please
    if: ${{ needs.release-please.outputs.release-created }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build application
        run: npm run build
        
      - name: Run tests
        run: npm test --if-present
        
      # Ici tu peux ajouter le déploiement vers Coolify
      - name: Deploy to Coolify
        run: |
          echo "🚀 Déploiement de la version ${{ needs.release-please.outputs.tag-name }}"
          # Ajouter ici les commandes de déploiement Coolify 