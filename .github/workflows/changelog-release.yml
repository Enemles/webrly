name: Changelog and Release

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      release_type:
        description: 'Type de release'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    name: Generate Changelog and Release
    runs-on: ubuntu-22.04
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.11.1'
          cache: 'pnpm'

      - name: Install dependencies
        run: |
          pnpm add -g standard-version
          pnpm install --frozen-lockfile

      - name: Setup environment variables for build
        run: |
          # Créer un .env minimal pour que le build passe
          echo "STRIPE_SECRET_KEY=sk_test_dummy_key_for_build" > .env
          echo "NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=pk_test_dummy_key_for_build" >> .env
          echo "CLERK_SECRET_KEY=sk_test_dummy_key_for_build" >> .env
          echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=pk_test_dummy_key_for_build" >> .env
          echo "DATABASE_URL=postgresql://dummy:dummy@localhost:5432/dummy" >> .env
          echo "NEXTAUTH_SECRET=dummy-secret-for-build" >> .env
          echo "NEXTAUTH_URL=https://webrly.com" >> .env
          echo "UPLOADTHING_SECRET=sk_live_dummykey123456789012345678901234567890123456789012345678" >> .env
          echo "UPLOADTHING_APP_ID=dummyapp1234" >> .env
          echo "NODE_ENV=production" >> .env

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Generate release (auto)
        if: github.event_name == 'push'
        run: |
          standard-version --no-verify

      - name: Generate release (manual)
        if: github.event_name == 'workflow_dispatch'
        run: |
          standard-version --release-as ${{ github.event.inputs.release_type }} --no-verify

      - name: Get new version from Git tag
        id: version
        run: |
          TAG=$(git describe --tags --abbrev=0)
          VERSION="${TAG#v}"
          echo "new_version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Push changes and tags
        run: |
          git push --follow-tags origin HEAD:${GITHUB_REF#refs/heads/}

      - name: Extract changelog for release
        id: changelog
        run: |
          VERSION=${{ steps.version.outputs.new_version }}
          if [ -f CHANGELOG.md ]; then
            CONTENT=$(awk "/^## \[${VERSION}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)
          else
            CONTENT="Première release automatisée"
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CONTENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          release_name: Release ${{ steps.version.outputs.tag }}
          body: |
            ## 🚀 Webrly ${{ steps.version.outputs.tag }}

            ${{ steps.changelog.outputs.changelog }}

            ---
            **Installation:**
            ```bash
            pnpm install
            pnpm run build
            pnpm start
            ```
          draft: false
          prerelease: false

      # Optionnel: Build et deploy après release
      - name: Build application
        if: steps.version.outputs.new_version
        run: |
          pnpm run build

      - name: Deploy notification
        if: steps.version.outputs.new_version
        run: |
          echo "🚀 Version ${{ steps.version.outputs.tag }} prête pour déploiement!"
          echo "📦 Nouvelle version disponible sur GitHub Releases"
          # Ici tu peux ajouter le déploiement vers Coolify
