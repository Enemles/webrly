name: 'Configuration Environnement'
description: 'Configure Node.js, pnpm, installe les dependances et configure les variables environnement'

inputs:
  environment-type:
    description: 'Type environnement (test, build, production)'
    required: true
    default: 'test'
  
  install-playwright:
    description: 'Installer Playwright'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Configuration Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Installation pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9

    - name: Installation des dépendances
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: Installation Playwright (conditionnel)
      if: inputs.install-playwright == 'true'
      shell: bash
      run: npx playwright install

    - name: Nettoyage cache Next.js
      if: inputs.environment-type == 'build'
      shell: bash
      run: |
        rm -rf .next
        rm -rf node_modules/.cache

    - name: Configuration variables d'environnement
      shell: bash
      run: |
        ENV_TYPE="${{ inputs.environment-type }}"
        
        if [ "$ENV_TYPE" = "production" ]; then
          # Production : utilise les vrais secrets GitHub
          cat > .env << EOF
        DATABASE_URL=${DATABASE_URL:-postgresql://testuser:testpass@localhost:5432/testdb}
        STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-sk_test_51234567890123456789012345678901234567890123456789012345678901234}
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-pk_test_51234567890123456789012345678901234567890123456789012345678901234}
        CLERK_SECRET_KEY=${CLERK_SECRET_KEY:-sk_test_1234567890123456789012345678901234567890123456789012345678901234}
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-pk_test_1234567890123456789012345678901234567890123456789012345678901234}
        UPLOADTHING_SECRET=${UPLOADTHING_SECRET:-sk_live_test123456789012345678901234567890123456789012345678901234567890}
        UPLOADTHING_APP_ID=${UPLOADTHING_APP_ID:-testapp123}
        NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-test-secret-for-ci-cd-only-not-production-safe}
        NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
        NODE_ENV=${NODE_ENV:-production}
        CI=true
        EOF
        else
          # Test/Build : utilise des valeurs factices mais valides
          cat > .env << EOF
        DATABASE_URL=postgresql://testuser:testpass@localhost:5432/testdb
        STRIPE_SECRET_KEY=sk_test_51234567890123456789012345678901234567890123456789012345678901234
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=pk_test_51234567890123456789012345678901234567890123456789012345678901234
        CLERK_SECRET_KEY=sk_test_1234567890123456789012345678901234567890123456789012345678901234
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=pk_test_1234567890123456789012345678901234567890123456789012345678901234
        UPLOADTHING_SECRET=sk_live_test123456789012345678901234567890123456789012345678901234567890
        UPLOADTHING_APP_ID=testapp123
        NEXTAUTH_SECRET=test-secret-for-ci-cd-only-not-production-safe
        NEXTAUTH_URL=http://localhost:3000
        NODE_ENV=${ENV_TYPE}
        CI=true
        EOF
        fi
        
        echo "✅ Variables d'environnement configurées pour: $ENV_TYPE" 