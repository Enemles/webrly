# 4. BASES DE DONNÉES (StatefulSets PostgreSQL)
# Note: Seuls les premiers StatefulSets sont inclus pour éviter un fichier trop long
# Les autres sont dans les dossiers séparés

# PostgreSQL pour Auth Service
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-auth
  namespace: webrly
spec:
  serviceName: postgres-auth-service
  replicas: 1
  selector:
    matchLabels:
      app: postgres-auth
  template:
    metadata:
      labels:
        app: postgres-auth
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        env:
        - name: POSTGRES_DB
          value: "webrly_auth"
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: webrly-secrets
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: webrly-secrets
              key: POSTGRES_PASSWORD
        ports:
        - containerPort: 5432
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-auth-service
  namespace: webrly
spec:
  selector:
    app: postgres-auth
  ports:
  - port: 5432
    targetPort: 5432
  clusterIP: None

