# ==========================================
# SCRIPT DE DÉPLOIEMENT WEBRLY KUBERNETES
# ==========================================
# 
# Ce fichier contient tous les manifests Kubernetes
# pour déployer l'architecture microservices Webrly
# 
# Usage: kubectl apply -f k8s/deploy.yaml
# 
# Architecture:
# - 9 microservices (Auth, Agency, CRM, Pipeline, Funnel, Media, Billing, Notification, Metrics)
# - 8 bases de données PostgreSQL séparées
# - 1 Redis simple pour cache haute performance
# - 1 Ingress Controller (API Gateway)
# - HPA pour auto-scaling
# - Network Policies pour sécurité
# - Monitoring avec Prometheus/Grafana
# 
# ==========================================

---
# 1. NAMESPACE
apiVersion: v1
kind: Namespace
metadata:
  name: webrly
  labels:
    name: webrly
    environment: production
    managed-by: kubectl
---
apiVersion: v1
kind: Namespace
metadata:
  name: webrly-monitoring
  labels:
    name: webrly-monitoring
    environment: production
    managed-by: kubectl

---
# 2. CONFIGMAPS
apiVersion: v1
kind: ConfigMap
metadata:
  name: webrly-config
  namespace: webrly
data:
  NODE_ENV: "production"
  REDIS_HOST: "redis-cache-service"
  REDIS_PORT: "6379"
  POSTGRES_HOST: "postgres-service"
  POSTGRES_PORT: "5432"
  NEXT_PUBLIC_DOMAIN: "webrly.com"
  NEXT_PUBLIC_SCHEME: "https"
  NEXT_PUBLIC_PLATFORM_AGENY_PERCENT: "10"
  NEXT_PUBLIC_PLATFORM_ONETIME_FEE: "1000"
  NEXT_PUBLIC_PLATFORM_SUBSCRIPTION_PERCENT: "5"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: microservices-config
  namespace: webrly
data:
  # Services URLs internes
  AUTH_SERVICE_URL: "http://auth-service:3001"
  AGENCY_SERVICE_URL: "http://agency-service:3002"
  CRM_SERVICE_URL: "http://crm-service:3003"
  PIPELINE_SERVICE_URL: "http://pipeline-service:3004"
  FUNNEL_SERVICE_URL: "http://funnel-service:3005"
  MEDIA_SERVICE_URL: "http://media-service:3006"
  BILLING_SERVICE_URL: "http://billing-service:3007"
  NOTIFICATION_SERVICE_URL: "http://notification-service:3008"
  METRICS_SERVICE_URL: "http://metrics-service:3009"
  
  # Circuit Breaker Config
  CIRCUIT_BREAKER_TIMEOUT: "3000"
  CIRCUIT_BREAKER_ERROR_THRESHOLD: "50"
  CIRCUIT_BREAKER_RESET_TIMEOUT: "30000"

