---
# PostgreSQL StatefulSet pour Metrics Service
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-metrics
  namespace: webrly
  labels:
    app: postgres-metrics
    service: metrics
    component: database
spec:
  serviceName: postgres-metrics-service
  replicas: 1
  selector:
    matchLabels:
      app: postgres-metrics
  template:
    metadata:
      labels:
        app: postgres-metrics
        service: metrics
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        env:
        - name: POSTGRES_DB
          value: "webrly_metrics"
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: webrly-secrets
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: webrly-secrets
              key: POSTGRES_PASSWORD
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: postgres-metrics-storage
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            memory: "256Mi"  # Peut être plus pour historique métriques
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
  volumeClaimTemplates:
  - metadata:
      name: postgres-metrics-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 2Gi  # Plus d'espace pour historique des métriques
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-metrics-service
  namespace: webrly
  labels:
    app: postgres-metrics
    service: metrics
spec:
  selector:
    app: postgres-metrics
  ports:
  - port: 5432
    targetPort: 5432
  clusterIP: None
