---
# PostgreSQL StatefulSet pour Funnel Service
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-funnel
  namespace: webrly
spec:
  serviceName: postgres-funnel-service
  replicas: 1
  selector:
    matchLabels:
      app: postgres-funnel
  template:
    metadata:
      labels:
        app: postgres-funnel
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        env:
        - name: POSTGRES_DB
          value: "webrly_funnel"
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: webrly-secrets
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: webrly-secrets
              key: POSTGRES_PASSWORD
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: postgres-funnel-storage
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
  volumeClaimTemplates:
  - metadata:
      name: postgres-funnel-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-funnel-service
  namespace: webrly
spec:
  selector:
    app: postgres-funnel
  ports:
  - port: 5432
    targetPort: 5432
  clusterIP: None
