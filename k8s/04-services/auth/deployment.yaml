# ==========================================
# 🔐 AUTH SERVICE - Microservice d'Authentification
# ==========================================
# 
# Responsabilités :
# - Authentification JWT et intégration Clerk
# - Gestion des sessions utilisateur
# - Autorisation et permissions
# - Circuit breaker pour APIs externes
# 
# Design Patterns :
# - Circuit Breaker (protection Clerk API)
# - Event-driven (publish user events)
# ==========================================

# ----------------------------------------
# DEPLOYMENT - Configuration du Microservice
# ----------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: webrly
  labels:
    app: auth-service
    service: auth
    component: microservice  # Pour sélecteurs monitoring
spec:
  # ========================================
  # RÉPLICATION ET SCALING
  # ========================================
  replicas: 3  # 3 replicas par défaut (HPA peut modifier)
  
  selector:
    matchLabels:
      app: auth-service
  
  template:
    metadata:
      labels:
        app: auth-service
        service: auth
        monitoring: enabled  # Pour ServiceMonitor Prometheus
    spec:
      containers:
      - name: auth-service
        # ========================================
        # IMAGE ET COMMANDE DE DÉMARRAGE
        # ========================================
        # Pour la démo : Node.js basique
        # En production : Image custom avec app réelle
        image: node:20-alpine
        command:
        - sh
        - -c
        - |
          # Serveur HTTP basique pour démonstration
          # En production : remplacer par vraie app microservice
          cat > server.js << 'EOF'
          const http = require('http');
          const server = http.createServer((req, res) => {
            res.writeHead(200, { 'Content-Type': 'application/json' });
            res.end(JSON.stringify({
              service: 'auth-service',
              status: 'healthy',
              timestamp: new Date().toISOString(),
              version: '1.0.0',
              database: 'webrly_auth',
              features: ['jwt', 'clerk', 'sessions', 'permissions']
            }));
          });
          server.listen(3001, () => {
            console.log('🔐 Auth Service running on port 3001');
          });
          EOF
          node server.js
        
        # ========================================
        # NETWORKING
        # ========================================
        ports:
        - containerPort: 3001  # Port standard Auth Service
          name: http
          protocol: TCP
        
        # ========================================
        # VARIABLES D'ENVIRONNEMENT
        # ========================================
        env:
        # Configuration globale depuis ConfigMap
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: webrly-config
              key: NODE_ENV
        
        # ----------------------------------------
        # Base de données PostgreSQL spécifique
        # Pattern: Database-per-service
        # ----------------------------------------
        - name: DATABASE_URL
          value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres-auth-service:5432/webrly_auth"
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: webrly-secrets
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: webrly-secrets
              key: POSTGRES_PASSWORD
        
        # ----------------------------------------
        # Redis (Event Bus + Cache)
        # ----------------------------------------
        - name: REDIS_URL
          value: "redis://redis-service:6379"
        
        # ----------------------------------------
        # Secrets pour authentification
        # ----------------------------------------
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: webrly-secrets
              key: JWT_SECRET
        - name: CLERK_SECRET_KEY  # API externe protégée par Circuit Breaker
          valueFrom:
            secretKeyRef:
              name: webrly-secrets
              key: CLERK_SECRET_KEY
        
        # ========================================
        # RESSOURCES ET LIMITES
        # ========================================
        # Configuration optimisée pour charge moyenne
        resources:
          requests:  # Ressources garanties (réservées)
            memory: "128Mi"  # 256 MB minimum
            cpu: "50m"      # 0.1 CPU minimum
          limits:    # Ressources maximales autorisées
            memory: "512Mi"  # 512 MB maximum
            cpu: "500m"      # 0.5 CPU maximum
        
        # ========================================
        # HEALTH CHECKS (Observabilité)
        # ========================================
        # Readiness Probe : Service prêt à recevoir du trafic
        readinessProbe:
          httpGet:
            path: /           # Endpoint de santé
            port: 3001
          initialDelaySeconds: 10  # Attendre 10s après démarrage
          periodSeconds: 5         # Vérifier toutes les 5s
          timeoutSeconds: 3        # Timeout 3s
          failureThreshold: 3      # 3 échecs = pod "not ready"
        
        # Liveness Probe : Service toujours vivant
        livenessProbe:
          httpGet:
            path: /           # Endpoint de santé
            port: 3001
          initialDelaySeconds: 30  # Attendre 30s (plus long pour startup)
          periodSeconds: 30        # Vérifier toutes les 30s
          timeoutSeconds: 5        # Timeout 5s
          failureThreshold: 3      # 3 échecs = restart pod

---
# ----------------------------------------
# SERVICE - Exposition et Service Discovery
# ----------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: webrly
  labels:
    app: auth-service
    monitoring: enabled  # Pour découverte monitoring
spec:
  # ========================================
  # SÉLECTEUR ET EXPOSITION
  # ========================================
  selector:
    app: auth-service  # Sélectionne les pods auth-service
  ports:
  - port: 3001          # Port exposé dans le cluster
    targetPort: 3001    # Port du container
    protocol: TCP
    name: http          # Nom pour monitoring
  type: ClusterIP       # Service interne (pas d'exposition externe)

---
# ----------------------------------------
# HPA - Auto-scaling Horizontal
# ----------------------------------------
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth-service-hpa
  namespace: webrly
  labels:
    app: auth-service
spec:
  # ========================================
  # CIBLE ET LIMITES DE SCALING
  # ========================================
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auth-service
  
  minReplicas: 2   # Minimum 2 pods (haute disponibilité)
  maxReplicas: 10  # Maximum 10 pods (selon charge)
  
  # ========================================
  # MÉTRIQUES DE SCALING
  # ========================================
  metrics:
  # Scaling basé sur CPU
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70  # Scale up si CPU > 70%
  
  # Scaling basé sur mémoire
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80  # Scale up si Memory > 80%
  
  # ========================================
  # COMPORTEMENT DE SCALING
  # ========================================
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60  # Attendre 60s avant scale up
      policies:
      - type: Percent
        value: 50      # Augmenter de 50% max par cycle
        periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300  # Attendre 5min avant scale down
      policies:
      - type: Percent
        value: 10      # Diminuer de 10% max par cycle
        periodSeconds: 60 